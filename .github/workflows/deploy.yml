name: Deploy to GitHub Pages

# Builds and publishes the static site to GitHub Pages on every push
# to main. Requires one-time setup in the repo's own Settings > Pages
# (see https://github.com/soyames/ardoisesite/settings/pages): set
# "Source" to "GitHub Actions" (not "Deploy from a branch"). The
# custom domain (ardoise.soyames.com, see public/CNAME) is configured
# in that same Pages settings screen -- Pages reads public/CNAME on
# each deploy to keep the DNS mapping, but the domain's own DNS record
# (a CNAME at your registrar pointing ardoise.soyames.com at
# soyames.github.io) is a one-time step outside this repo entirely.
#
# VITE_API_BASE_URL is baked in at build time (see src/config/env.js's
# docstring for why -- one backend per school, this frontend build
# points at exactly one). Set it as a repository Actions variable
# (Settings > Secrets and variables > Actions > Variables) named
# VITE_API_BASE_URL; falls back to the pilot school's URL if unset so
# a first deploy doesn't silently break.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.laliberte.soyames.com' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
