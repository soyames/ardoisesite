name: Deploy to Cloudflare Pages

# Publishes the frontend build to the ardoise-saas Cloudflare Pages
# project on every push to main. That project has no native Git
# integration - it was deployed once by hand via `wrangler pages
# deploy` before this workflow existed, so without this, deploys
# silently drift from source.
#
# The project serves both ardoiseeduc.com (marketplace) and
# saas.ardoiseeduc.com (SaaS portal) as custom domains bound to the
# same build - domainRedirect.js tells them apart at runtime via
# window.location.hostname. GitHub Pages previously served the
# marketplace half from a separate deploy.yml workflow, but its
# custom-domain HTTPS provisioning proved unreliable, so this single
# Cloudflare Pages project now handles both.
#
# Required one-time setup (GitHub UI, never in this file): Settings >
# Secrets and variables > Actions > add:
#   CLOUDFLARE_API_TOKEN - a token scoped to "Cloudflare Pages: Edit"
#     for the soyames account (create at dash.cloudflare.com -> My
#     Profile -> API Tokens -> Create Token -> Edit Cloudflare Workers
#     template, or a custom token with Account.Cloudflare Pages: Edit).
#   CLOUDFLARE_ACCOUNT_ID - bbdb90c7c2aeeaa8b4c8f8331ab5bef7 (soyames)
#
# VITE_API_BASE_URL is baked in at build time (see src/config/env.js's
# docstring for why -- one backend per school, this frontend build
# points at exactly one). Set it as a repository Actions variable
# named VITE_API_BASE_URL; falls back to the central platform
# Worker's workers.dev URL if unset.
#
# VITE_FEDAPAY_PUBLIC_KEY/VITE_FEDAPAY_ENVIRONMENT: FedaPay publishable
# key, safe to bake into the client bundle (same trust model as a
# Stripe publishable key). Set as repo Actions variables; falls back to
# the sandbox key so a first deploy doesn't silently break checkout.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://ardoise-api.soyames.workers.dev' }}
          VITE_FEDAPAY_PUBLIC_KEY: ${{ vars.VITE_FEDAPAY_PUBLIC_KEY || 'pk_sandbox_OmhNPRnROc1ZNiJAM5Yq0sQ4' }}
          VITE_FEDAPAY_ENVIRONMENT: ${{ vars.VITE_FEDAPAY_ENVIRONMENT || 'sandbox' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=ardoise-saas --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
